[tools]
bun = "1.3.14"

[tasks.test]
description = "Run the test suite"
run = "bun test"

[tasks.test-watch]
description = "Run tests in watch mode"
run = "bun test --watch"

[tasks.coverage]
description = "Run tests with coverage report"
run = "bun test --coverage --coverage-reporter=text --coverage-reporter=lcov"

[tasks.cli]
description = "Run the thatch CLI (list, show, search, forget)"
run = "bun run bin/thatch"

[tasks.release]
description = "Bump version, commit, tag, and push (args: patch|minor|major)"
run = "bin/release"

