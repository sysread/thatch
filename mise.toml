[env]
# Enable opencode background sub-agents (task tool background:true parameter).
# Gated behind an experimental flag in opencode; without this, the task tool
# strips the `background` parameter from its schema entirely, forcing
# synchronous sub-agent dispatch. Also set in bashrc for global coverage.
OPENCODE_EXPERIMENTAL_BACKGROUND_SUBAGENTS = "true"

[tools]
bun = "1.3.14"

[tasks.test]
description = "Run the test suite"
run = "bun test"

[tasks.test-watch]
description = "Run tests in watch mode"
run = "bun test --watch"

[tasks.coverage]
description = "Run tests with coverage report"
run = "bun test --coverage --coverage-reporter=text --coverage-reporter=lcov"

[tasks.cli]
description = "Run the thatch CLI (list, show, search, forget)"
run = "bun run bin/thatch"

[tasks.typecheck]
description = "Typecheck src + tests (tsconfig.check.json)"
run = "bunx tsc -p tsconfig.check.json"

[tasks.lint-md]
description = "Lint markdown docs (README.md + docs/, excluding docs/plans)"
run = "bunx markdownlint-cli2"

[tasks.check]
description = "Typecheck, run tests, and lint markdown docs"
run = "bunx tsc -p tsconfig.check.json && bun test && bunx markdownlint-cli2"

[tasks.release]
description = "Bump version, commit, tag, and push (args: patch|minor|major)"
run = "bin/release"

