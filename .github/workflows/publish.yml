name: Publish

on:
  push:
    tags: ["v*"]

# id-token: write lets npm authenticate via GitHub's OIDC token instead of a
# stored secret. Requires a Trusted Publisher configured on npmjs.com for
# this package pointing at sysread/thatch + publish.yml.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      # OIDC publish needs npm >= 11.5.1; the runner's default may lag.
      # No registry-url / .npmrc / tokens — npm detects the OIDC environment.
      - run: npm install -g npm@latest
      - run: npm publish --access public
