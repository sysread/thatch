name: Publish

on:
  push:
    tags: ["v*"]

# id-token: write lets npm authenticate via GitHub's OIDC token instead of a
# stored secret. Requires a Trusted Publisher configured on npmjs.com for
# this package pointing at sysread/thatch + publish.yml.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      # OIDC publish needs npm >= 11.5.1. setup-node installs into the
      # user-writable tool cache (the runner's stock node in /usr/local is
      # root-owned, so npm can't self-upgrade there). Deliberately NO
      # registry-url — it writes a token-expecting .npmrc that preempts
      # the OIDC exchange.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g npm@latest
      - run: npm publish --access public
