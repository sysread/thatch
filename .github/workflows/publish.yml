name: Publish

on:
  push:
    tags: ["v*"]

# id-token: write lets npm authenticate via GitHub's OIDC token instead of a
# stored secret. Requires a Trusted Publisher configured on npmjs.com for
# this package pointing at sysread/thatch + publish.yml.
permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
      # OIDC publish needs npm >= 11.5.1. setup-node installs into the
      # user-writable tool cache (the runner's stock node in /usr/local is
      # root-owned, so npm can't self-upgrade there). Deliberately NO
      # registry-url — it writes a token-expecting .npmrc that preempts
      # the OIDC exchange. Pin to npm@11: npm 12.0.0 shipped with a broken
      # sigstore dependency that crashes provenance signing with
      # "Cannot find module 'sigstore'".
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g npm@11
      - run: npm publish --access public

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              ...context.repo,
              title: `Publish failed: ${tag}`,
              body: [
                `The publish workflow for \`${tag}\` failed.`,
                ``,
                `[View the failed run](${runUrl})`,
                ``,
                `Check the logs for the failing step. Common causes:`,
                `- npm registry or sigstore/provenance outage`,
                `- Broken npm version (pin npm@11 in the workflow if sigstore is missing)`,
                `- OIDC trusted publisher misconfiguration on npmjs.com`,
                ``,
                `Recovery: fix the workflow, delete and re-tag ${tag} at the fixed commit, push.`,
              ].join('\n'),
              labels: ['publish-failure'],
            });
